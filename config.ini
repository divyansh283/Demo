[FOLDERS]
; Relative paths are resolved from the project folder when launched by the BAT file.
; You can also replace these with absolute Windows paths.
input_folder  = OCR_Input
output_folder = OCR_Output

[LANGUAGES]
; Tesseract language codes joined with '+'.
; Requires the matching Tesseract language data packs to be installed.
; Common codes: eng (English), hin (Hindi), mar (Marathi), guj (Gujarati),
;               ben (Bengali), tam (Tamil), tel (Telugu), kan (Kannada)
tesseract_lang = eng+hin+mar

[AZURE]
; Azure AI Document Intelligence endpoint and API key.
; Keep this file private if it contains a real API key.
endpoint = https://skyai-document-ai.cognitiveservices.azure.com
api_key  = 2d6131eb1ccc49c2a4741fad1f329236

[THRESHOLDS]
; Tesseract word-level confidence thresholds (0-100 scale).
; Pages whose average confidence falls below warning_threshold are sent to Azure.
; Pages below high_risk_threshold are flagged as HIGH RISK in the logs.
warning_threshold   = 60
high_risk_threshold = 30
